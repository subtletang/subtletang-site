<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>subtletang: links</title>
<meta name="description" content="subtletang — links">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

<style>

:root{
--navy:#0f1a3a;
--logoBlue:#1b2f7a;
--logoBg:#d8d8dd;

--text:var(--logoBg);
--muted:rgba(216,216,221,.65);

--border:rgba(216,216,221,.18);
--border2:rgba(216,216,221,.25);

--shadow:0 20px 70px rgba(0,0,0,.5);

--radius:26px;
--max:980px;
--pad:26px;
--headerH:74px;
}

*{
box-sizing:border-box;
}

html,body{
height:100%;
}

body{
margin:0;
font-family:"JetBrains Mono", monospace;
background:var(--navy);
color:var(--text);
overflow-x:hidden;
}

/* header */

header{
position:fixed;
top:0;
left:0;
right:0;
height:var(--headerH);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
background:var(--logoBg);
border-bottom:1px solid rgba(0,0,0,.08);
z-index:1000;
}

.brand{
display:flex;
align-items:center;
gap:12px;
min-width:180px;
text-decoration:none;
color:inherit;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--logoBlue);
}

.brandName{
font-style:italic;
font-weight:600;
letter-spacing:.2px;
color:var(--logoBlue);
}

/* menu */

.menuWrap{
position:relative;
}

.menuBtn{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 14px;
border-radius:999px;
border:1px solid var(--logoBlue);
background:transparent;
color:var(--logoBlue);
cursor:pointer;
font:inherit;
}

.chev{
width:10px;
height:10px;
border-right:2px solid var(--logoBlue);
border-bottom:2px solid var(--logoBlue);
transform:rotate(45deg);
margin-top:-2px;
}

.menu{
position:absolute;
right:0;
top:calc(100% + 10px);
min-width:220px;
padding:10px;
border-radius:18px;
background:var(--navy);
border:1px solid var(--border);
box-shadow:0 22px 70px rgba(0,0,0,.55);
display:none;
}

.menu.open{
display:block;
}

.menu a{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
border-radius:14px;
color:var(--logoBg);
text-decoration:none;
border:1px solid transparent;
}

.menu a:hover{
background:rgba(27,47,122,.15);
border-color:rgba(27,47,122,.45);
}

.menu small{
color:var(--muted);
}

/* main */

main{
max-width:var(--max);
margin:0 auto;
padding:calc(var(--headerH) + 36px) var(--pad) 46px;
}

.titleRow{
display:flex;
align-items:baseline;
justify-content:space-between;
gap:16px;
margin-bottom:18px;
}

h1{
margin:0;
font-size:18px;
letter-spacing:2px;
text-transform:uppercase;
}

.sub{
color:var(--muted);
font-size:12px;
}

/* panel */

.panel{
border-radius:var(--radius);
background:linear-gradient(
160deg,
rgba(15,26,58,.95) 0%,
rgba(27,47,122,.65) 100%
);
border:1px solid var(--border2);
box-shadow:var(--shadow);
padding:18px;
}

.block{
margin-top:12px;
padding:16px;
border-radius:18px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.12);
}

.block:first-child{
margin-top:0;
}

.blockTitle{
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
font-size:12px;
color:var(--logoBg);
}

.blockSub{
color:var(--muted);
font-size:12px;
margin-top:6px;
}

.pills{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:12px;
}

.pill{
display:inline-flex;
align-items:center;
justify-content:center;
padding:10px 14px;
border-radius:999px;
border:1px solid var(--border);
background:rgba(255,255,255,.06);
color:var(--logoBg);
text-decoration:none;
font-size:12px;
white-space:nowrap;
transition:.15s ease;
}

.pill:hover{
background:rgba(27,47,122,.25);
border-color:rgba(27,47,122,.45);
}

.pill.disabled{
opacity:.45;
pointer-events:none;
}

/* footer */

footer{
margin-top:26px;
padding-top:18px;
border-top:1px solid var(--border);
display:flex;
justify-content:flex-start;
font-size:12px;
color:var(--muted);
}

@media (max-width:700px){

.titleRow{
flex-direction:column;
align-items:flex-start;
}

}

</style>
</head>

<body>

<header>
  <a href="index.html" class="brand">
    <img src="IMG_8238.jpeg" class="logo" alt="subtletang logo">
    <div class="brandName">subtletang</div>
  </a>

  <div class="menuWrap">
    <button id="menuBtn" class="menuBtn" aria-expanded="false">
      Menu <span class="chev"></span>
    </button>

    <nav id="menu" class="menu">
      <a href="index.html">Home <small>hub</small></a>
      <a href="releases.html">Releases <small>mp3 / zip</small></a>
      <a href="links.html">Links <small>platforms</small></a>
      <a href="store.html">Store <small>merch</small></a>
      <a href="about.html">About <small>statement</small></a>
      <a href="contact.html">Contact <small>email</small></a>
    </nav>
  </div>
</header>

<main>
  <div class="titleRow">
    <h1>Links</h1>
    <div class="sub">socials + music</div>
  </div>

  <div class="panel">

    <div class="block">
      <div class="blockTitle">Socials</div>
      <div class="blockSub">Updates, clips, and contact.</div>
      <div class="pills">
        <a class="pill" href="https://www.instagram.com/subtletang" target="_blank" rel="noopener">Instagram</a>
        <a class="pill" href="https://www.facebook.com/p/Logan-Ryan-100076125385439/" target="_blank" rel="noopener">Facebook</a>
        <a class="pill" href="mailto:subtletang@gmail.com">Email</a>
      </div>
    </div>

    <div class="block">
      <div class="blockTitle">Music</div>
      <div class="blockSub">Where you can find the releases.</div>
      <div class="pills">
        <a class="pill" href="https://on.soundcloud.com/s8zCzp4dX2ACgjhZtG" target="_blank" rel="noopener">SoundCloud</a>
        <a class="pill" href="https://www.youtube.com/channel/UCz0fuOJuNF6ILGj5sQnAWpw" target="_blank" rel="noopener">YouTube</a>
        <a class="pill" href="https://open.spotify.com/artist/6UAaqTK5uza7Bwg4lhlX6K?si=uGmdeqpSRpGUATm2ar60tA" target="_blank" rel="noopener">Spotify</a>
      </div>
    </div>

  </div>

  <footer>
    <div>subtletang</div>
  </footer>
</main>

<script>
const btn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");

function closeMenu(){
menu.classList.remove("open");
btn.setAttribute("aria-expanded","false");
}

function openMenu(){
menu.classList.add("open");
btn.setAttribute("aria-expanded","true");
}

btn.addEventListener("click",(e)=>{
e.stopPropagation();
menu.classList.contains("open") ? closeMenu() : openMenu();
});

document.addEventListener("click",closeMenu);

menu.querySelectorAll("a").forEach(a=>{
a.addEventListener("click",closeMenu);
});
</script>

</body>
</html>
