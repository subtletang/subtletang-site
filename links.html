<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SubtleTang — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root{
      --bgTop:#050505; --bgMid:#2a2c2d; --bgBot:#e9ddb7;
      --text: rgba(255,255,255,.92); --muted: rgba(255,255,255,.62);
      --shadow: 0 22px 90px rgba(0,0,0,.62);
      --radius: 26px; --max: 980px; --pad: 26px; --headerH: 74px;
    }
    *{ box-sizing:border-box; } html,body{ height:100%; }
    body{ margin:0; color:var(--text); font-family:"JetBrains Mono", ui-monospace, monospace; background:#000; }
    body::before{ content:""; position:fixed; inset:0; z-index:-2;
      background: radial-gradient(900px 520px at 50% 14%, rgba(255,255,255,.10), transparent 62%),
                  linear-gradient(to bottom, var(--bgTop) 0%, var(--bgMid) 58%, var(--bgBot) 100%);
      transform: translateZ(0);
    }
    header{ position:fixed; inset:0 0 auto 0; height:var(--headerH); display:flex; align-items:center; justify-content:space-between;
      padding:0 18px; background:#000; border-bottom:1px solid rgba(255,255,255,.08); z-index:1000; }
    .brand{ display:flex; align-items:center; gap:12px; min-width:180px; }
    .dot{ width:28px;height:28px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04); }
    .brandName{ font-style:italic; font-weight:600; }
    .menuWrap{ position:relative; }
    .menuBtn{ display:inline-flex; align-items:center; gap:10px; padding:10px 14px; border-radius:999px;
      border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.06); color:rgba(255,255,255,.85);
      cursor:pointer; font:inherit; }
    .chev{ width:10px;height:10px;border-right:2px solid rgba(255,255,255,.65);border-bottom:2px solid rgba(255,255,255,.65);transform:rotate(45deg);margin-top:-2px; }
    .menu{ position:absolute; right:0; top:calc(100% + 10px); min-width:220px; padding:10px; border-radius:18px;
      background:rgba(0,0,0,.82); border:1px solid rgba(255,255,255,.14); box-shadow:0 22px 70px rgba(0,0,0,.55);
      backdrop-filter: blur(10px); display:none; }
    .menu.open{ display:block; }
    .menu a{ display:flex; align-items:center; justify-content:space-between; padding:12px 12px; border-radius:14px;
      color:rgba(255,255,255,.85); text-decoration:none; border:1px solid transparent; }
    .menu a:hover{ background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.12); }
    .menu small{ color:rgba(255,255,255,.45); }
    main{ max-width:var(--max); margin:0 auto; padding: calc(var(--headerH) + 36px) var(--pad) 46px; }
    .titleRow{ display:flex; align-items:baseline; justify-content:space-between; gap:16px; margin-bottom:18px; }
    h1{ margin:0; font-size:18px; letter-spacing:2px; text-transform:uppercase; }
    .sub{ color:var(--muted); font-size:12px; }
    .panel{
      border-radius: var(--radius);
      background: radial-gradient(1200px 520px at 50% 0%, rgba(255,255,255,.10), transparent 60%),
                  linear-gradient(to bottom, rgba(255,255,255,.08), rgba(255,255,255,.035));
      border:1px solid rgba(255,255,255,.16);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .block{
      margin-top:12px;
      padding:16px;
      border-radius:18px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
    }
    .blockTitle{ font-weight:700; letter-spacing:2px; text-transform:uppercase; font-size:12px; color:rgba(255,255,255,.78); }
    .blockSub{ color:var(--muted); font-size:12px; margin-top:6px; }
    .pills{ display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; }
    .pill{
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 14px; border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.85);
      text-decoration:none;
      font-size:12px;
      white-space:nowrap;
    }
    .pill.disabled{ opacity:.45; pointer-events:none; }
    footer{ margin-top:26px; padding-top:18px; border-top:1px solid rgba(255,255,255,.10); display:flex; justify-content:space-between; color:rgba(255,255,255,.45); font-size:12px; }
  </style>
</head>
<body>
<header>
  <div class="brand"><div class="dot"></div><div class="brandName">Subtletang</div></div>
  <div class="menuWrap">
    <button id="menuBtn" class="menuBtn" aria-expanded="false">Menu <span class="chev"></span></button>
    <nav id="menu" class="menu">
      <a href="index.html">Home <small>hub</small></a>
      <a href="releases.html">Releases <small>mp3 / zip</small></a>
      <a href="links.html">Links <small>platforms</small></a>
      <a href="store.html">Store <small>merch</small></a>
      <a href="about.html">About <small>statement</small></a>
      <a href="contact.html">Contact <small>email</small></a>
    </nav>
  </div>
</header>

<main>
  <div class="titleRow">
    <h1>Links</h1>
    <div class="sub">socials + music</div>
  </div>

  <div class="panel">
    <div class="block">
      <div class="blockTitle">Socials</div>
      <div class="blockSub">Updates, clips, and contact.</div>
      <div class="pills">
        <a class="pill" href="https://www.instagram.com/subtletang" target="_blank" rel="noopener">Instagram</a>
        <a class="pill" href="https://www.facebook.com/p/Logan-Ryan-100076125385439/" target="_blank" rel="noopener">Facebook</a>
        <a class="pill" href="mailto:subtletang@gmail.com">Email</a>
      </div>
    </div>

    <div class="block">
      <div class="blockTitle">Music</div>
      <div class="blockSub">Where you can find the releases.</div>
      <div class="pills">
        <a class="pill" href="https://on.soundcloud.com/s8zCzp4dX2ACgjhZtG" target="_blank" rel="noopener">SoundCloud</a>
        <a class="pill" href="https://www.youtube.com/channel/UCz0fuOJuNF6ILGj5sQnAWpw" target="_blank" rel="noopener">YouTube</a>
        <span class="pill disabled">Spotify (soon)</span>
      </div>
    </div>
  </div>

  <footer><div>Subtletang</div><div>Independent Project</div></footer>
</main>

<script>
  const btn = document.getElementById('menuBtn');
  const menu = document.getElementById('menu');
  function closeMenu(){ menu.classList.remove('open'); btn.setAttribute('aria-expanded','false'); }
  function openMenu(){ menu.classList.add('open'); btn.setAttribute('aria-expanded','true'); }
  btn.addEventListener('click', (e)=>{ e.stopPropagation(); menu.classList.contains('open') ? closeMenu() : openMenu(); });
  document.addEventListener('click', ()=>closeMenu());
  menu.querySelectorAll('a').forEach(a=>a.addEventListener('click', ()=>closeMenu()));
</script>
</body>
</html>
