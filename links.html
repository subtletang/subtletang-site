<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subtletang — Links</title>
  <meta name="description" content="Subtletang — socials + music links." />

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root{
      --black:#07080a;
      --black2:#0b0d10;

      --cream:#f2e6c9;
      --cream2:rgba(242,230,201,.78);

      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.62);

      --glass:rgba(255,255,255,.06);
      --glass2:rgba(255,255,255,.035);
      --border:rgba(242,230,201,.16);

      --shadow:0 18px 70px rgba(0,0,0,.55);
      --radius:22px;

      --max:1100px;
      --pad:28px;

      --headerH:76px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      font-family:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      background:
        radial-gradient(1200px 700px at 50% -80px, rgba(255,255,255,.12), rgba(255,255,255,0) 60%),
        linear-gradient(180deg, #000 0%, #0a0c10 35%, #0b0d10 60%, #0b0d10 100%);
      overflow-x:hidden;
    }

    /* bottom “cream fog” layer (the thing that was sliding on mobile) */
    body::after{
      content:"";
      position:fixed;
      left:0; right:0; bottom:0;
      height:52vh;
      pointer-events:none;
      background:linear-gradient(180deg, rgba(242,230,201,0) 0%, rgba(242,230,201,.35) 40%, rgba(242,230,201,.78) 100%);
      opacity:.75;
      transform:translateZ(0);
      z-index:-1;
    }
    /* keep it from jumping behind cards on iOS */
    @supports (-webkit-touch-callout: none){
      body::after{ position:fixed; }
    }

    a{ color:inherit; text-decoration:none; }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:calc(var(--headerH) + 26px) var(--pad) 56px;
    }

    /* top bar */
    header{
      position:fixed;
      top:0; left:0; right:0;
      height:var(--headerH);
      z-index:20;
      background:linear-gradient(180deg, rgba(0,0,0,.92), rgba(0,0,0,.75));
      border-bottom:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .headerInner{
      max-width:var(--max);
      height:100%;
      margin:0 auto;
      padding:0 var(--pad);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:180px;
    }
    .dot{
      width:26px;
      height:26px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.02);
      box-shadow:0 8px 30px rgba(0,0,0,.45) inset;
    }
    .brandName{
      font-style:italic;
      letter-spacing:.02em;
      font-weight:700;
    }

    /* menu */
    .menuWrap{ position:relative; }
    .menuBtn{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);
      color:var(--text);
      cursor:pointer;
      user-select:none;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    .chev{
      width:10px; height:10px;
      border-right:2px solid rgba(255,255,255,.65);
      border-bottom:2px solid rgba(255,255,255,.65);
      transform:rotate(45deg);
      margin-top:-2px;
      opacity:.9;
    }
    .menu{
      position:absolute;
      right:0;
      top:calc(100% + 10px);
      min-width:210px;
      padding:10px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,12,16,.82);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
      display:none;
    }
    .menu.open{ display:block; }
    .menu a{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 10px;
      border-radius:12px;
      color:rgba(255,255,255,.88);
    }
    .menu a:hover{
      background:rgba(255,255,255,.06);
    }
    .menu .sep{
      height:1px;
      margin:8px 0;
      background:rgba(255,255,255,.08);
    }
    .menu .here{
      background:rgba(242,230,201,.08);
      border:1px solid rgba(242,230,201,.14);
    }

    /* section header */
    .sectionTop{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:20px;
      margin:8px 0 16px;
    }
    .hLabel{
      text-transform:uppercase;
      letter-spacing:.22em;
      font-weight:700;
      font-size:22px;
      margin:0;
    }
    .hTag{
      color:rgba(255,255,255,.58);
      font-size:14px;
      white-space:nowrap;
    }

    /* big container + inner cards */
    .panel{
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow:var(--shadow);
      padding:18px;
    }
    .innerCard{
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      padding:18px;
    }
    .innerCard + .innerCard{ margin-top:14px; }

    .subHead{
      text-transform:uppercase;
      letter-spacing:.22em;
      font-weight:700;
      color:rgba(255,255,255,.82);
      font-size:14px;
      margin:0 0 8px;
    }
    .subText{
      color:rgba(255,255,255,.62);
      margin:0 0 14px;
      line-height:1.5;
    }

    .pillRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(242,230,201,.16);
      background:rgba(255,255,255,.05);
      color:rgba(255,255,255,.86);
      font-size:13px;
      box-shadow:0 12px 40px rgba(0,0,0,.35);
      transition:transform .15s ease, background .15s ease, border-color .15s ease;
    }
    .pill:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.07);
      border-color:rgba(242,230,201,.22);
    }
    .pill.disabled{
      opacity:.45;
      cursor:default;
      pointer-events:none;
      transform:none;
    }

    footer{
      margin-top:26px;
      padding-top:26px;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      justify-content:space-between;
      color:rgba(255,255,255,.55);
      font-size:12px;
    }

    @media (max-width: 700px){
      :root{ --pad:18px; --headerH:70px; }
      .hLabel{ font-size:20px; }
      .hTag{ font-size:13px; }
      .panel{ padding:14px; }
      .innerCard{ padding:16px; }
    }

    /* iOS safe area */
    @supports(padding: max(0px)){
      .wrap{ padding-bottom: max(56px, env(safe-area-inset-bottom)); }
      header{ padding-top: env(safe-area-inset-top); height: calc(var(--headerH) + env(safe-area-inset-top)); }
      .headerInner{ height: calc(var(--headerH) + env(safe-area-inset-top)); padding-top: env(safe-area-inset-top); }
    }
  </style>
</head>

<body>
  <header>
    <div class="headerInner">
      <a class="brand" href="index.html" aria-label="Home">
        <span class="dot" aria-hidden="true"></span>
        <span class="brandName">Subtletang</span>
      </a>

      <div class="menuWrap">
        <button id="menuBtn" class="menuBtn" aria-haspopup="true" aria-expanded="false">
          Menu <span class="chev" aria-hidden="true"></span>
        </button>

        <nav id="menu" class="menu" aria-label="Site">
          <a href="index.html">Home <span>↩</span></a>
          <div class="sep"></div>
          <a href="releases.html">Releases <span>↗</span></a>
          <a class="here" href="links.html">Links <span>•</span></a>
          <a href="store.html">Store <span>↗</span></a>
          <div class="sep"></div>
          <a href="about.html">About <span>↗</span></a>
          <a href="contact.html">Contact <span>↗</span></a>
        </nav>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="sectionTop">
      <h1 class="hLabel">Links</h1>
      <div class="hTag">socials + music</div>
    </div>

    <section class="panel">
      <!-- SOCIALS -->
      <div class="innerCard">
        <h2 class="subHead">Socials</h2>
        <p class="subText">Updates, clips, and contact.</p>

        <div class="pillRow">
          <a class="pill" href="https://www.instagram.com/subtletang" target="_blank" rel="noopener noreferrer">Instagram</a>
          <a class="pill" href="https://www.facebook.com/p/Logan-Ryan-100076125385439/" target="_blank" rel="noopener noreferrer">Facebook</a>
        </div>

        <!-- Email shown as text only (no button, no mailto) -->
        <p class="subText" style="margin-top:14px; margin-bottom:0;">
          subtletang@gmail.com
        </p>
      </div>

      <!-- MUSIC -->
      <div class="innerCard">
        <h2 class="subHead">Music</h2>
        <p class="subText">Where you can find the releases.</p>

        <div class="pillRow">
          <a class="pill" href="https://on.soundcloud.com/s8zCzp4dX2ACgjhZtG" target="_blank" rel="noopener noreferrer">SoundCloud</a>
          <a class="pill" href="https://www.youtube.com/channel/UCz0fuOJuNF6ILGj5sQnAWpw" target="_blank" rel="noopener noreferrer">YouTube</a>
          <span class="pill disabled">Spotify (soon)</span>
        </div>
      </div>
    </section>

    <footer>
      <div>Subtletang</div>
      <div>Independent Project</div>
    </footer>
  </main>

  <script>
    const btn = document.getElementById('menuBtn');
    const menu = document.getElementById('menu');

    function closeMenu(){
      menu.classList.remove('open');
      btn.setAttribute('aria-expanded','false');
    }
    function toggleMenu(){
      const open = menu.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleMenu();
    });

    document.addEventListener('click', () => closeMenu());
    menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => closeMenu()));
  </script>
</body>
</html>
