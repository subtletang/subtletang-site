<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>subtletang</title>
<meta name="description" content="subtletang — releases, archives, and direct downloads.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

<style>

:root{
--navy:#0f1a3a;
--logoBlue:#1b2f7a;
--logoBg:#d8d8dd;

--text:var(--logoBg);
--muted:rgba(216,216,221,.65);

--border:rgba(216,216,221,.18);
--border2:rgba(216,216,221,.25);

--shadow:0 20px 70px rgba(0,0,0,.5);

--radius:26px;
--max:1200px;
--pad:26px;
--headerH:74px;
}

*{
box-sizing:border-box;
}

html,body{
height:100%;
}

body{
margin:0;
font-family:"JetBrains Mono", monospace;
background:var(--navy);
color:var(--text);
overflow-x:hidden;
}

/* header */

header{
position:fixed;
top:0;
left:0;
right:0;
height:var(--headerH);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
background:var(--logoBg);
border-bottom:1px solid rgba(0,0,0,.08);
z-index:1000;
}

.brand{
display:flex;
align-items:center;
gap:12px;
min-width:180px;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--logoBlue);
}

.brandName{
font-style:italic;
font-weight:600;
letter-spacing:.2px;
color:var(--logoBlue);
}

/* menu */

.menuWrap{
position:relative;
}

.menuBtn{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 14px;
border-radius:999px;
border:1px solid var(--logoBlue);
background:transparent;
color:var(--logoBlue);
cursor:pointer;
font:inherit;
}

.chev{
width:10px;
height:10px;
border-right:2px solid var(--logoBlue);
border-bottom:2px solid var(--logoBlue);
transform:rotate(45deg);
margin-top:-2px;
}

.menu{
position:absolute;
right:0;
top:calc(100% + 10px);
min-width:220px;
padding:10px;
border-radius:18px;
background:var(--navy);
border:1px solid var(--border);
box-shadow:0 22px 70px rgba(0,0,0,.55);
display:none;
}

.menu.open{
display:block;
}

.menu a{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
border-radius:14px;
color:var(--logoBg);
text-decoration:none;
border:1px solid transparent;
}

.menu a:hover{
background:rgba(27,47,122,.15);
border-color:rgba(27,47,122,.45);
}

.menu small{
color:var(--muted);
}

/* main */

main{
max-width:var(--max);
margin:0 auto;
padding:calc(var(--headerH) + 46px) var(--pad) 42px;
}

/* pill */

.pillWrap{
display:flex;
justify-content:center;
}

.pill{
display:inline-flex;
align-items:center;
gap:12px;
padding:10px 16px;
border-radius:999px;
border:1px solid var(--border);
background:rgba(255,255,255,.05);
margin-bottom:26px;
color:var(--logoBg);
}

.pillDot{
width:6px;
height:6px;
border-radius:99px;
background:var(--logoBlue);
}

/* featured */

.featured{
position:relative;
overflow:hidden;
margin-bottom:28px;
border-radius:var(--radius);
padding:24px;
border:1px solid var(--border2);
background:
radial-gradient(circle at top right, rgba(216,216,221,.09), transparent 28%),
linear-gradient(
160deg,
rgba(15,26,58,.98) 0%,
rgba(27,47,122,.78) 100%
);
box-shadow:var(--shadow);
animation:fadeIn .6s ease;
}

.featured::after{
content:"";
position:absolute;
right:-80px;
top:-80px;
width:220px;
height:220px;
background:radial-gradient(circle, rgba(216,216,221,.08), transparent 65%);
pointer-events:none;
}

.featuredInner{
position:relative;
display:flex;
align-items:center;
justify-content:space-between;
gap:24px;
}

.featuredText{
max-width:620px;
}

.featuredTitle{
margin:0;
font-size:34px;
line-height:1.05;
letter-spacing:1px;
text-transform:uppercase;
color:var(--logoBg);
}

.featuredSub{
margin-top:12px;
font-size:14px;
line-height:1.5;
color:var(--muted);
max-width:56ch;
}

.featuredActions{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-top:18px;
}

.featuredBtn{
display:inline-flex;
align-items:center;
justify-content:center;
padding:11px 16px;
border-radius:999px;
border:1px solid var(--border);
background:rgba(255,255,255,.06);
color:var(--logoBg);
text-decoration:none;
font-size:12px;
transition:.18s ease;
}

.featuredBtn:hover{
transform:translateY(-1px);
background:rgba(29,185,84,.18);
border-color:rgba(29,185,84,.45);
}

.featuredArt{
flex:0 0 180px;
display:flex;
justify-content:center;
}

.featuredArt img{
width:180px;
height:180px;
border-radius:22px;
object-fit:cover;
border:1px solid var(--border2);
box-shadow:0 18px 50px rgba(0,0,0,.45),
            0 0 40px rgba(255,120,60,.15);
transition:.25s ease;
}

.featuredArt img:hover{
transform:scale(1.03);
box-shadow:0 25px 70px rgba(0,0,0,.6),
            0 0 60px rgba(255,120,60,.25);
}

/* cards */

.hubGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.hubCard{
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:var(--logoBg);
border-radius:var(--radius);
padding:22px;
border:1px solid var(--border2);
background:linear-gradient(
160deg,
rgba(15,26,58,.95) 0%,
rgba(27,47,122,.65) 100%
);
box-shadow:var(--shadow);
min-height:96px;
transition:.2s ease;
}

.hubCard:hover{
transform:translateY(-3px);
background:linear-gradient(
160deg,
rgba(27,47,122,.9) 0%,
rgba(15,26,58,1) 100%
);
}

.hubCardText{
font-size:22px;
letter-spacing:2px;
text-transform:uppercase;
font-weight:700;
color:var(--logoBg);
}

/* footer */

footer{
margin-top:26px;
padding-top:18px;
border-top:1px solid var(--border);
display:flex;
justify-content:space-between;
font-size:12px;
color:var(--muted);
}

/* motion */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* responsive */

@media (max-width:980px){

.hubGrid{
grid-template-columns:1fr;
}

main{
padding-top:calc(var(--headerH) + 34px);
}

.featuredInner{
flex-direction:column-reverse;
align-items:flex-start;
}

.featuredArt{
flex:0 0 auto;
}

.featuredTitle{
font-size:26px;
}

.featuredArt img{
width:150px;
height:150px;
}

footer{
flex-direction:column;
gap:8px;
}

.hubCard{
min-height:90px;
}

.hubCardText{
font-size:20px;
}

}

</style>
</head>

<body>

<header>

<div class="brand">
<img src="IMG_8238.jpeg" class="logo" alt="subtletang logo">
<div class="brandName">subtletang</div>
</div>

<div class="menuWrap">

<button id="menuBtn" class="menuBtn" aria-expanded="false">
Menu <span class="chev"></span>
</button>

<nav id="menu" class="menu">
<a href="index.html">Home <small>hub</small></a>
<a href="releases.html">Releases <small>mp3 / zip</small></a>
<a href="links.html">Links <small>platforms</small></a>
<a href="store.html">Store <small>merch</small></a>
<a href="about.html">About <small>statement</small></a>
<a href="contact.html">Contact <small>email</small></a>
</nav>

</div>
</header>

<main>

<div class="pillWrap">
<div class="pill">
<span>Navigate</span>
<span class="pillDot"></span>
<span>Hub</span>
</div>
</div>

<div class="featured">
  <div class="featuredInner">

    <div class="featuredText">
      <h1 class="featuredTitle">The Secret Recipe</h1>
      <div class="featuredSub">subtletang</div>

      <div class="featuredActions">
        <a class="featuredBtn" href="https://open.spotify.com/artist/6UAaqTK5uza7Bwg4lhlX6K?si=uGmdeqpSRpGUATm2ar60tA" target="_blank" rel="noopener">Listen on Spotify</a>
      </div>
    </div>

    <div class="featuredArt">
      <img src="secret-recipe.jpg" alt="The Secret Recipe artwork">
    </div>

  </div>
</div>

<div class="hubGrid">

<a class="hubCard" href="releases.html">
  <div class="hubCardText">Releases</div>
</a>

<a class="hubCard" href="links.html">
  <div class="hubCardText">Links</div>
</a>

<a class="hubCard" href="store.html">
  <div class="hubCardText">Store</div>
</a>

</div>

<footer>
<div>subtletang</div>
<div>Independent Project</div>
</footer>

</main>

<script>

const btn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");

function closeMenu(){
menu.classList.remove("open");
btn.setAttribute("aria-expanded","false");
}

function openMenu(){
menu.classList.add("open");
btn.setAttribute("aria-expanded","true");
}

btn.addEventListener("click",(e)=>{
e.stopPropagation();
menu.classList.contains("open") ? closeMenu() : openMenu();
});

document.addEventListener("click",closeMenu);

menu.querySelectorAll("a").forEach(a=>{
a.addEventListener("click",closeMenu);
});

</script>

</body>
</html>
