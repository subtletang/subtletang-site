<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>subtletang</title>
<meta name="description" content="subtletang — releases, archives, and direct downloads.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

<style>

:root{
--navy:#0f1a3a;
--logoBlue:#1b2f7a;
--logoBg:#d8d8dd;

--text:var(--logoBg);
--muted:rgba(216,216,221,.65);

--border:rgba(216,216,221,.18);
--border2:rgba(216,216,221,.25);

--shadow:0 20px 70px rgba(0,0,0,.5);

--radius:26px;
--max:1200px;
--pad:26px;
--headerH:74px;
}

*{
box-sizing:border-box;
}

html,body{
height:100%;
}

body{
margin:0;
font-family:"JetBrains Mono", monospace;
background:var(--navy);
color:var(--text);
overflow-x:hidden;
}

/* header */

header{
position:fixed;
top:0;
left:0;
right:0;
height:var(--headerH);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
background:var(--logoBg);
border-bottom:1px solid rgba(0,0,0,.08);
z-index:1000;
}

.brand{
display:flex;
align-items:center;
gap:12px;
min-width:180px;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--logoBlue);
}

.brandName{
font-style:italic;
font-weight:600;
letter-spacing:.2px;
color:var(--logoBlue);
}

/* menu */

.menuWrap{
position:relative;
}

.menuBtn{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 14px;
border-radius:999px;
border:1px solid var(--logoBlue);
background:transparent;
color:var(--logoBlue);
cursor:pointer;
font:inherit;
}

.chev{
width:10px;
height:10px;
border-right:2px solid var(--logoBlue);
border-bottom:2px solid var(--logoBlue);
transform:rotate(45deg);
margin-top:-2px;
}

.menu{
position:absolute;
right:0;
top:calc(100% + 10px);
min-width:220px;
padding:10px;
border-radius:18px;
background:var(--navy);
border:1px solid var(--border);
box-shadow:0 22px 70px rgba(0,0,0,.55);
display:none;
}

.menu.open{
display:block;
}

.menu a{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
border-radius:14px;
color:var(--logoBg);
text-decoration:none;
border:1px solid transparent;
}

.menu a:hover{
background:rgba(27,47,122,.15);
border-color:rgba(27,47,122,.45);
}

.menu small{
color:var(--muted);
}

/* main */

main{
max-width:var(--max);
margin:0 auto;
padding:calc(var(--headerH) + 46px) var(--pad) 42px;
}

/* pill */

.pillWrap{
display:flex;
justify-content:center;
}

.pill{
display:inline-flex;
align-items:center;
gap:12px;
padding:10px 16px;
border-radius:999px;
border:1px solid var(--border);
background:rgba(255,255,255,.05);
margin-bottom:26px;
color:var(--logoBg);
}

.pillDot{
width:6px;
height:6px;
border-radius:99px;
background:var(--logoBlue);
}

/* cards */

.hubGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.hubCard{
display:flex;
flex-direction:column;
justify-content:space-between;
text-decoration:none;
color:var(--logoBg);
border-radius:var(--radius);
padding:22px;
border:1px solid var(--border2);
background:rgba(27,47,122,.08);
box-shadow:var(--shadow);
min-height:210px;
transition:.15s ease;
}

.hubCard:hover{
transform:translateY(-2px);
background:rgba(27,47,122,.18);
}

.cardTop{
display:flex;
justify-content:space-between;
}

.kicker{
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
font-weight:700;
color:var(--logoBg);
}

.meta{
font-size:12px;
color:var(--muted);
text-transform:lowercase;
}

.cardBody{
margin-top:12px;
line-height:1.4;
font-size:14px;
max-width:48ch;
color:var(--logoBg);
}

.cardFooter{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:18px;
font-size:13px;
color:var(--muted);
}

.arrow{
width:22px;
height:22px;
border-radius:999px;
border:1px solid var(--border);
display:grid;
place-items:center;
}

.arrow::before{
content:"";
width:7px;
height:7px;
border-right:2px solid var(--logoBg);
border-top:2px solid var(--logoBg);
transform:rotate(45deg);
}

/* footer */

footer{
margin-top:26px;
padding-top:18px;
border-top:1px solid var(--border);
display:flex;
justify-content:space-between;
font-size:12px;
color:var(--muted);
}

/* responsive */

@media (max-width:980px){

.hubGrid{
grid-template-columns:1fr;
}

.hubCard{
min-height:190px;
}

main{
padding-top:calc(var(--headerH) + 34px);
}

}

</style>
</head>

<body>

<header>

<div class="brand">
<img src="IMG_8238.jpeg" class="logo">
<div class="brandName">subtletang</div>
</div>

<div class="menuWrap">

<button id="menuBtn" class="menuBtn">
Menu <span class="chev"></span>
</button>

<nav id="menu" class="menu">

<a href="index.html">Home <small>hub</small></a>
<a href="releases.html">Releases <small>mp3 / zip</small></a>
<a href="links.html">Links <small>platforms</small></a>
<a href="store.html">Store <small>merch</small></a>
<a href="about.html">About <small>statement</small></a>
<a href="contact.html">Contact <small>email</small></a>

</nav>
</div>
</header>

<main>

<div class="pillWrap">
<div class="pill">
<span>Navigate</span>
<span class="pillDot"></span>
<span>Hub</span>
</div>
</div>

<div class="hubGrid">

<a class="hubCard" href="releases.html">

<div>
<div class="cardTop">
<div class="kicker">Releases</div>
<div class="meta">free downloads</div>
</div>

<div class="cardBody">
Releases, MP3 files, archive, and more.
</div>
</div>

<div class="cardFooter">
<span>Open</span>
<span class="arrow"></span>
</div>

</a>

<a class="hubCard" href="links.html">

<div>
<div class="cardTop">
<div class="kicker">Links</div>
<div class="meta">platforms</div>
</div>

<div class="cardBody">
Come find me here.
</div>
</div>

<div class="cardFooter">
<span>Open</span>
<span class="arrow"></span>
</div>

</a>

<a class="hubCard" href="store.html">

<div>
<div class="cardTop">
<div class="kicker">Store</div>
<div class="meta">merch</div>
</div>

<div class="cardBody">
Coming soon...
</div>
</div>

<div class="cardFooter">
<span>Open</span>
<span class="arrow"></span>
</div>

</a>

</div>

<footer>
<div>subtletang</div>
<div>Independent Project</div>
</footer>

</main>

<script>

const btn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");

function closeMenu(){
menu.classList.remove("open");
}

function openMenu(){
menu.classList.add("open");
}

btn.addEventListener("click",(e)=>{
e.stopPropagation();
menu.classList.contains("open") ? closeMenu() : openMenu();
});

document.addEventListener("click",closeMenu);

menu.querySelectorAll("a").forEach(a=>{
a.addEventListener("click",closeMenu);
});

</script>

</body>
</html>
