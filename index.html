<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subtletang</title>
  <meta name="description" content="Subtletang — official site." />

  <style>
    :root{
      --bg: #0b0c0f;
      --bg2:#090a0d;
      --panel: rgba(255,255,255,0.03);
      --panel2: rgba(255,255,255,0.02);
      --text: rgba(255,255,255,0.88);
      --muted: rgba(255,255,255,0.62);
      --cream: #f2e6c9;
      --cream2: rgba(242,230,201,0.70);
      --border: rgba(242,230,201,0.16);
      --border2: rgba(255,255,255,0.10);
      --shadow: 0 12px 36px rgba(0,0,0,0.45);
      --radius: 18px;
      --radius2: 14px;
      --max: 1120px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1100px 700px at 12% 10%, rgba(242,230,201,0.09), transparent 60%),
        radial-gradient(900px 650px at 82% 22%, rgba(242,230,201,0.06), transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      letter-spacing: 0.15px;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--cream); }

    .wrap { max-width: var(--max); margin: 0 auto; padding: 26px 22px 80px; }

    /* top bar */
    header{
      display:flex; align-items:center; justify-content:space-between;
      gap: 14px;
      position: sticky; top: 0;
      padding: 16px 0;
      backdrop-filter: blur(10px);
      background: linear-gradient(to bottom, rgba(11,12,15,0.78), rgba(11,12,15,0));
      z-index: 10;
    }

    .brand{
      display:flex; align-items:center; gap: 12px;
      min-width: 190px;
    }

    .mark{
      width: 34px; height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: radial-gradient(circle at 35% 30%, rgba(242,230,201,0.35), rgba(242,230,201,0.06) 55%, transparent 72%);
      box-shadow: var(--shadow);
    }

    .brand b{
      font-weight: 650;
      letter-spacing: 0.6px;
    }

    nav{
      display:flex; align-items:center; gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill{
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 13px;
      line-height: 1;
    }
    .pill:hover{ border-color: var(--border); color: var(--cream); }

    .cta{
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(242,230,201,0.06);
      color: var(--cream);
      font-size: 13px;
      line-height: 1;
    }
    .cta:hover{ background: rgba(242,230,201,0.10); }

    /* hero */
    .hero{
      margin-top: 24px;
      padding: 46px 26px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      box-shadow: var(--shadow);
      position: relative;
      overflow:hidden;
    }
    .hero:before{
      content:"";
      position:absolute; inset:-42% -30% auto auto;
      width: 560px; height: 560px;
      background: radial-gradient(circle at 30% 30%, rgba(242,230,201,0.20), transparent 56%);
      transform: rotate(18deg);
      pointer-events:none;
    }
    .hero:after{
      content:"";
      position:absolute; left:-180px; bottom:-220px;
      width: 520px; height: 520px;
      background: radial-gradient(circle at 60% 45%, rgba(242,230,201,0.10), transparent 60%);
      pointer-events:none;
    }

    .kicker{
      display:inline-flex; align-items:center; gap: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--cream2);
      background: rgba(242,230,201,0.05);
      font-size: 12px;
      letter-spacing: 0.45px;
      text-transform: uppercase;
    }

    h1{
      margin: 16px 0 10px;
      font-size: clamp(40px, 6.2vw, 68px);
      letter-spacing: -1.2px;
      line-height: 1.02;
    }

    .sub{
      max-width: 64ch;
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    .heroActions{
      display:flex; gap: 12px; flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn{
      display:inline-flex; align-items:center; gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(242,230,201,0.06);
      color: var(--cream);
      font-size: 14px;
    }
    .btn:hover{ background: rgba(242,230,201,0.10); }
    .btn.secondary{
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border-color: rgba(255,255,255,0.10);
    }
    .btn.secondary:hover{ border-color: var(--border); color: var(--cream); }

    /* sections */
    .grid{
      margin-top: 14px;
      display:grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 14px;
    }

    @media (max-width: 900px){
      .grid{ grid-template-columns: 1fr; }
      header{ position: relative; }
      .brand{ min-width: unset; }
    }

    .card{
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      padding: 22px;
    }

    .card h2{
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.55px;
      text-transform: uppercase;
    }

    .muted{ color: var(--muted); line-height: 1.7; }

    .list{
      margin: 14px 0 0;
      display:flex; flex-direction: column;
      gap: 10px;
    }

    .item{
      display:flex; align-items:flex-start; justify-content:space-between;
      gap: 14px;
      padding: 12px 12px;
      border-radius: var(--radius2);
      border: 1px solid rgba(242,230,201,0.12);
      background: rgba(242,230,201,0.04);
    }
    .item:hover{ border-color: rgba(242,230,201,0.22); background: rgba(242,230,201,0.055); }

    .item b{
      display:block;
      font-weight: 650;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.2px;
      margin-bottom: 3px;
    }

    .meta{
      display:flex; gap: 8px; flex-wrap: wrap;
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      margin-top: 2px;
    }

    .tag{
      display:inline-flex; align-items:center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.02);
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      white-space: nowrap;
    }

    .rightCol .card{ position: sticky; top: 92px; }
    @media (max-width: 900px){ .rightCol .card{ position: static; } }

    .links{
      margin-top: 12px;
      display:flex; flex-wrap: wrap;
      gap: 10px;
    }

    .linkBtn{
      display:inline-flex; align-items:center; gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.02);
      font-size: 13px;
      color: rgba(255,255,255,0.82);
    }
    .linkBtn:hover{ border-color: rgba(242,230,201,0.22); background: rgba(242,230,201,0.05); color: var(--cream); }

    .divider{
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(242,230,201,0.22), transparent);
      margin: 18px 0;
    }

    footer{
      margin-top: 18px;
      padding: 18px 4px 0;
      color: rgba(255,255,255,0.50);
      display:flex; justify-content:space-between; gap: 14px;
      flex-wrap: wrap;
      font-size: 12px;
    }

    /* small util */
    .dot{
      width: 8px; height: 8px; border-radius: 999px;
      background: rgba(242,230,201,0.75);
      box-shadow: 0 0 0 4px rgba(242,230,201,0.08);
    }

    /* anchor offset for sticky header */
    section{ scroll-margin-top: 110px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <b>Subtletang</b>
      </div>

      <nav>
        <a class="pill" href="#releases">Releases</a>
        <a class="pill" href="#about">About</a>
        <a class="pill" href="#links">Links</a>
        <a class="cta" href="mailto:hello@subtletang.com">Email</a>
      </nav>
    </header>

    <main>
      <section class="hero" id="top">
        <div class="kicker"><span class="dot"></span> minimal / dark / cream</div>
        <h1>Subtletang</h1>
        <p class="sub">
          A minimal home for releases, visuals, and everything moving under the Subtletang name.
          Quiet design. Clean signal. No filler.
        </p>

        <div class="heroActions">
          <!-- Replace # with real links as you add them -->
          <a class="btn" href="#releases">View releases</a>
          <a class="btn secondary" href="#links">Open links</a>
