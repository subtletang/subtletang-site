<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>subtletang</title>
<meta name="description" content="subtletang — releases, archives, and direct downloads.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

<style>

:root{
--navy:#0f1a3a;
--logoBlue:#1b2f7a;
--logoBg:#d8d8dd;

--text:var(--logoBg);
--muted:rgba(216,216,221,.65);

--border:rgba(216,216,221,.18);
--border2:rgba(216,216,221,.25);

--shadow:0 20px 70px rgba(0,0,0,.5);

--radius:26px;
--max:1200px;
--pad:26px;
--headerH:74px;
}

*{box-sizing:border-box;}
html,body{height:100%;}

body{
margin:0;
font-family:"JetBrains Mono", monospace;
background:var(--navy);
color:var(--text);
overflow-x:hidden;
}

/* header */

header{
position:fixed;
top:0;
left:0;
right:0;
height:var(--headerH);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
background:var(--logoBg);
border-bottom:1px solid rgba(0,0,0,.08);
z-index:1000;
}

.brand{
display:flex;
align-items:center;
gap:12px;
min-width:180px;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:2px solid var(--logoBlue);
}

.brandName{
font-style:italic;
font-weight:600;
letter-spacing:.2px;
color:var(--logoBlue);
}

/* menu */

.menuWrap{position:relative;}

.menuBtn{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 14px;
border-radius:999px;
border:1px solid var(--logoBlue);
background:transparent;
color:var(--logoBlue);
cursor:pointer;
font:inherit;
}

.chev{
width:10px;height:10px;
border-right:2px solid var(--logoBlue);
border-bottom:2px solid var(--logoBlue);
transform:rotate(45deg);
margin-top:-2px;
}

.menu{
position:absolute;
right:0;
top:calc(100% + 10px);
min-width:220px;
padding:10px;
border-radius:18px;
background:var(--navy);
border:1px solid var(--border);
box-shadow:0 22px 70px rgba(0,0,0,.55);
display:none;
}

.menu.open{display:block;}

.menu a{
display:flex;
justify-content:space-between;
padding:12px;
border-radius:14px;
color:var(--logoBg);
text-decoration:none;
}

.menu a:hover{
background:rgba(27,47,122,.15);
}

.menu small{color:var(--muted);}

/* main */

main{
max-width:var(--max);
margin:0 auto;
padding:calc(var(--headerH) + 46px) var(--pad) 42px;
}

/* pill */

.pillWrap{display:flex;justify-content:center;}

.pill{
display:inline-flex;
align-items:center;
gap:12px;
padding:10px 16px;
border-radius:999px;
border:1px solid var(--border);
background:rgba(255,255,255,.05);
margin-bottom:26px;
}

.pillDot{
width:6px;height:6px;border-radius:99px;background:var(--logoBlue);
}

/* featured */

.featured{
margin-bottom:28px;
border-radius:var(--radius);
padding:24px;
border:1px solid var(--border2);
background:linear-gradient(160deg,#0f1a3a,#1b2f7a);
box-shadow:var(--shadow);
animation:fadeIn .6s ease;
}

.featuredInner{
display:flex;
justify-content:space-between;
align-items:center;
gap:24px;
}

.featuredTitle{
font-size:32px;
margin-top:8px;
}

.featuredSub{
margin-top:8px;
color:var(--muted);
}

.featuredBtn{
margin-top:16px;
display:inline-block;
padding:10px 16px;
border-radius:999px;
border:1px solid var(--border);
text-decoration:none;
color:white;
font-size:12px;
}

.featuredBtn:hover{
background:rgba(29,185,84,.2);
}

.featuredArt img{
width:180px;
height:180px;
border-radius:20px;
object-fit:cover;
box-shadow:0 20px 60px rgba(0,0,0,.5);
}

/* cards */

.hubGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

.hubCard{
display:flex;
flex-direction:column;
justify-content:space-between;
text-decoration:none;
color:white;
border-radius:var(--radius);
padding:22px;
border:1px solid var(--border2);
background:linear-gradient(160deg,#0f1a3a,#1b2f7a);
box-shadow:var(--shadow);
}

.hubCard:hover{transform:translateY(-3px);}

.cardFooter{
display:flex;
justify-content:space-between;
margin-top:18px;
}

/* footer */

footer{
margin-top:26px;
padding-top:18px;
border-top:1px solid var(--border);
display:flex;
justify-content:space-between;
font-size:12px;
color:var(--muted);
}

/* animation */

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<header>
<div class="brand">
<img src="IMG_8238.jpeg" class="logo">
<div class="brandName">subtletang</div>
</div>

<div class="menuWrap">
<button id="menuBtn" class="menuBtn">
Menu <span class="chev"></span>
</button>

<nav id="menu" class="menu">
<a href="index.html">Home <small>hub</small></a>
<a href="releases.html">Releases <small>mp3 / zip</small></a>
<a href="links.html">Links <small>platforms</small></a>
<a href="store.html">Store <small>merch</small></a>
<a href="about.html">About <small>statement</small></a>
<a href="contact.html">Contact <small>email</small></a>
</nav>
</div>
</header>

<main>

<div class="pillWrap">
<div class="pill">
<span>Navigate</span>
<span class="pillDot"></span>
<span>Hub</span>
</div>
</div>

<div class="featured">
<div class="featuredInner">

<div>
<div class="featuredLabel">Now playing</div>
<div class="featuredTitle">The Secret Recipe</div>
<div class="featuredSub">subtletang</div>

<a class="featuredBtn" href="https://open.spotify.com/artist/6UAaqTK5uza7Bwg4lhlX6K?si=uGmdeqpSRpGUATm2ar60tA" target="_blank">
Listen on Spotify
</a>
</div>

<div class="featuredArt">
<img src="secret-recipe.jpg">
</div>

</div>
</div>

<div class="hubGrid">

<a class="hubCard" href="releases.html">
<div>Releases</div>
<div class="cardFooter"><span>Open</span></div>
</a>

<a class="hubCard" href="links.html">
<div>Links</div>
<div class="cardFooter"><span>Open</span></div>
</a>

<a class="hubCard" href="store.html">
<div>Store</div>
<div class="cardFooter"><span>Open</span></div>
</a>

</div>

<footer>
<div>subtletang</div>
<div>Independent Project</div>
</footer>

</main>

<script>
const btn=document.getElementById("menuBtn");
const menu=document.getElementById("menu");

btn.onclick=()=>menu.classList.toggle("open");
document.onclick=()=>menu.classList.remove("open");
</script>

</body>
</html>
