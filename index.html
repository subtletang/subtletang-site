<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subtletang</title>
  <meta name="description" content="Subtletang — releases, archives, and direct downloads." />

  <!-- Font (clean italic headline vibe) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap" rel="stylesheet">

  <style>
    :root{
      --black:#07080a;
      --black2:#0b0d10;

      --cream:#f2e6c9;
      --cream2:rgba(242,230,201,.78);

      --text:rgba(255,255,255,.90);
      --muted:rgba(255,255,255,.62);

      --glass:rgba(255,255,255,.06);
      --glass2:rgba(255,255,255,.035);
      --border:rgba(242,230,201,.16);

      --shadow:0 18px 70px rgba(0,0,0,.55);
      --radius:22px;

      --max:1100px;
      --pad:28px;

      /* fixed header height used by anchor offset */
      --headerH:76px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color:var(--text);

      /* bottom-up cream -> black */
      background:
        linear-gradient(to top, rgba(242,230,201,.92) 0%, rgba(242,230,201,.45) 18%, rgba(7,8,10,.55) 55%, rgba(7,8,10,1) 100%),
        radial-gradient(1200px 700px at 50% 0%, rgba(255,255,255,.12), transparent 60%),
        radial-gradient(900px 500px at 20% 30%, rgba(242,230,201,.10), transparent 60%),
        radial-gradient(900px 500px at 80% 35%, rgba(242,230,201,.06), transparent 60%),
        linear-gradient(180deg, var(--black), var(--black2));
      background-attachment: fixed;
    }

    a{ color:inherit; text-decoration:none; }
    a:hover{ opacity:.92; }

    .wrap{
      width:min(var(--max), calc(100% - 40px));
      margin:0 auto;
    }

    /* ===== Fixed top bar (solid black) ===== */
    .topbar{
      position:fixed;
      top:0; left:0; right:0;
      height:var(--headerH);
      background: #000; /* solid */
      border-bottom: 1px solid rgba(255,255,255,.08);
      z-index:999;
    }
    .topbar .wrap{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width: 180px;
    }
    .logoDot{
      width:28px; height:28px;
      border-radius:999px;
      background:#050607;
      border:1px solid rgba(255,255,255,.12);
      box-shadow: 0 8px 30px rgba(0,0,0,.55) inset;
    }
    .brandTitle{
      font-family:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-style: italic;
      letter-spacing:.2px;
      opacity:.95;
      user-select:none;
    }

    /* dropdown */
    .menuWrap{ position:relative; }
    .menuBtn{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(242,230,201,.20);
      color:var(--text);
      cursor:pointer;
      user-select:none;
    }
    .chev{
      width:10px; height:10px;
      border-right:2px solid rgba(255,255,255,.75);
      border-bottom:2px solid rgba(255,255,255,.75);
      transform: rotate(45deg);
      margin-top:-2px;
      opacity:.9;
    }
    .menu{
      position:absolute;
      right:0;
      top:calc(100% + 10px);
      width:220px;
      border-radius:16px;
      background: rgba(10,11,13,.92);
      border:1px solid rgba(242,230,201,.14);
      box-shadow: var(--shadow);
      padding:10px;
      display:none;
      backdrop-filter: blur(10px);
    }
    .menu.open{ display:block; }
    .menu a{
      display:flex;
      padding:10px 12px;
      border-radius:12px;
      color:rgba(255,255,255,.9);
    }
    .menu a:hover{
      background: rgba(255,255,255,.06);
    }

    /* ===== Page spacing below fixed header ===== */
    main{
      padding-top: calc(var(--headerH) + 34px);
      padding-bottom: 90px;
    }

    /* CTAs (kept minimal; optional) */
    .ctaRow{
      display:flex;
      justify-content:center;
      gap:10px;
      margin: 8px 0 22px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(242,230,201,.18);
      color:rgba(255,255,255,.9);
      font-weight:600;
      font-size:13px;
      letter-spacing:.2px;
      cursor:pointer;
    }
    .btn:hover{ background: rgba(255,255,255,.08); }

    /* ===== Section grid ===== */
    .stack{
      margin-top: 14px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .card{
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.03));
      border:1px solid rgba(242,230,201,.14);
      box-shadow: 0 12px 46px rgba(0,0,0,.45);
      overflow:hidden;
    }

    .cardInner{
      padding: 18px 18px 16px;
    }

    .cardTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:10px;
    }
    .kicker{
      font-family:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      letter-spacing: .16em;
      font-size: 12px;
      text-transform: uppercase;
      color: rgba(242,230,201,.92);
    }
    .metaTag{
      font-family:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      color: rgba(255,255,255,.55);
      margin-top:2px;
      white-space:nowrap;
    }
    .desc{
      margin:0;
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.55;
    }

    .rows{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:12px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      padding:12px 12px;
      border-radius:16px;
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }
    .row strong{
      display:block;
      font-size:14px;
      letter-spacing:.2px;
    }
    .row small{
      display:block;
      margin-top:3px;
      color: rgba(255,255,255,.58);
      font-family:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
    }

    .rowActions{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 12px;
      border-radius:999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(242,230,201,.16);
      color: rgba(255,255,255,.88);
      font-size:12.5px;
      font-weight:650;
      cursor:pointer;
      white-space:nowrap;
    }
    .pill:hover{ background: rgba(255,255,255,.08); }

    /* section anchor offset so fixed header doesn't cover */
    section{ scroll-margin-top: calc(var(--headerH) + 16px); }

    /* footer */
    footer{
      margin-top: 26px;
      padding: 26px 0 0;
      color: rgba(255,255,255,.55);
      font-size:12px;
    }
    .footerInner
